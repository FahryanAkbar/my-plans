services:

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: monitoring-api
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app
      - /app/node_modules

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: monitoring-worker
    volumes:
      - ./worker:/app
      - /app/node_modules

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monitoring
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"

  influxdb:
    image: influxdb:2
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb-data:/var/lib/influxdb2